name: Build & Deploy

# Deploy on push to main, or manually. Infra is managed separately (terraform.yml);
# this workflow only ships a new image and rolls the ECS service.
on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write # OIDC
  contents: read

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: tam-server-node-prod
  ECS_CLUSTER: tam-server-node-prod
  ECS_SERVICE: tam-server-node-prod
  ECS_TASK_FAMILY: tam-server-node-prod
  CONTAINER_NAME: app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC, no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          docker build -t "$IMAGE" ./app
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Render new task definition
        id: taskdef
        run: |
          aws ecs describe-task-definition --task-definition "$ECS_TASK_FAMILY" \
            --query 'taskDefinition' --output json > taskdef.json
          # Strip read-only fields AWS rejects on re-register.
          jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
            taskdef.json > clean.json
          mv clean.json taskdef.json

      - name: Update image in task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: taskdef.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS (wait for stable)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
