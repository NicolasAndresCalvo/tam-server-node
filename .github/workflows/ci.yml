name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Lint & test app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.node-version

      - name: Run tests
        run: npm test

      - name: Build image (smoke)
        run: docker build -t app:ci .
